version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shortzz-app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - vendor_data:/var/www/html/vendor
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=shortzz_db
      - DB_USERNAME=shortzz_user
      - DB_PASSWORD=${DB_PASSWORD:-shortzz_secret_2024}
    networks:
      - shortzz-network

  db:
    image: mysql:8.0
    container_name: shortzz-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret_2024}
      MYSQL_DATABASE: shortzz_db
      MYSQL_USER: shortzz_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-shortzz_secret_2024}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./shortzz_database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - shortzz-network

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local
  storage_data:
    driver: local

networks:
  shortzz-network:
    driver: bridge
